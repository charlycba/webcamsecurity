<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monitor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Monitor</h1>
        <p>Video en vivo en tiempo real.</p>
      </header>

      <section class="viewer">
        <div class="monitor-frame" id="monitorFrame">
          <video id="liveVideo" autoplay playsinline muted></video>
        </div>
        <div class="overlay" aria-live="polite">
          <div class="overlay-card">
            <span class="info-label">IP del dispositivo</span>
            <span class="info-value" id="deviceIp">Desconocida</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">Calidad de transmision</span>
            <span class="info-value" id="deviceQuality">Desconocida</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">FPS en vivo</span>
            <span class="info-value" id="liveFps">--</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">Latencia</span>
            <span class="info-value" id="liveLatency">--</span>
          </div>
        </div>
      </section>

      <section class="controls monitor-controls">
        <button id="fullscreenBtn" type="button">⛶ Pantalla completa</button>
        <div class="zoom-control">
          <button id="zoomOutBtn" type="button" aria-label="Reducir zoom">−</button>
          <label for="zoomRange">Zoom</label>
          <input id="zoomRange" type="range" min="1" max="2.5" step="0.1" value="1" />
          <span id="zoomValue">100%</span>
          <button id="zoomInBtn" type="button" aria-label="Aumentar zoom">+</button>
        </div>
        <button id="resetZoomBtn" type="button">Reset zoom</button>
        <a id="openLogs" href="/monitor.html?logs=1" target="_blank" rel="noopener">Ver logs</a>
      </section>

      <section class="logs hidden" id="logsSection">
        <h2>Logs de transmision</h2>
        <pre id="logsContent"></pre>
      </section>

      <section class="status" id="status"></section>
    </main>

    <script>
      const liveVideo = document.getElementById("liveVideo");
      const monitorFrame = document.getElementById("monitorFrame");
      const status = document.getElementById("status");
      const deviceIp = document.getElementById("deviceIp");
      const deviceQuality = document.getElementById("deviceQuality");
      const liveFps = document.getElementById("liveFps");
      const liveLatency = document.getElementById("liveLatency");
      const fullscreenBtn = document.getElementById("fullscreenBtn");
      const zoomRange = document.getElementById("zoomRange");
      const zoomValue = document.getElementById("zoomValue");
      const zoomOutBtn = document.getElementById("zoomOutBtn");
      const zoomInBtn = document.getElementById("zoomInBtn");
      const resetZoomBtn = document.getElementById("resetZoomBtn");
      const logsSection = document.getElementById("logsSection");
      const logsContent = document.getElementById("logsContent");
      const logs = [];
      let lastStoredSize = 0;
      let lastFrameAt = 0;
      let smoothedFps = 0;
      let lastMeta = null;
      let rtcPeer = null;
      let rtcDataChannel = null;
      let webrtcActive = false;

      const params = new URLSearchParams(window.location.search);
      const showLogs = params.get("logs") === "1";
      let panX = 0;
      let panY = 0;
      let isPanning = false;
      let dragStartX = 0;
      let dragStartY = 0;

      if (showLogs) {
        logsSection.classList.remove("hidden");
      }

      function applyTransform() {
        monitorFrame.style.setProperty("--pan-x", `${panX}px`);
        monitorFrame.style.setProperty("--pan-y", `${panY}px`);
      }

      function clampPan(value, limit) {
        return Math.min(limit, Math.max(-limit, value));
      }

      function computePanLimits() {
        const zoom = Number(zoomRange.value);
        if (zoom <= 1) {
          return { limitX: 0, limitY: 0 };
        }
        const limitX = (monitorFrame.clientWidth * (zoom - 1)) / 2;
        const limitY = (monitorFrame.clientHeight * (zoom - 1)) / 2;
        return { limitX, limitY };
      }

      function centerPan() {
        panX = 0;
        panY = 0;
        applyTransform();
      }

      function updateZoomDisplay(value) {
        zoomValue.textContent = `${Math.round(value * 100)}%`;
        monitorFrame.style.setProperty("--zoom", value);
        if (value <= 1) {
          centerPan();
        } else {
          const limits = computePanLimits();
          panX = clampPan(panX, limits.limitX);
          panY = clampPan(panY, limits.limitY);
          applyTransform();
        }
      }

      function clampZoom(value) {
        const min = Number(zoomRange.min);
        const max = Number(zoomRange.max);
        return Math.min(max, Math.max(min, value));
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          monitorFrame.requestFullscreen().catch(() => {});
          return;
        }
        document.exitFullscreen().catch(() => {});
      }

      function updateFullscreenLabel() {
        const isFullscreen = document.fullscreenElement === monitorFrame;
        fullscreenBtn.textContent = isFullscreen ? "Salir pantalla completa" : "⛶ Pantalla completa";
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function formatLog(message) {
        const time = new Date().toLocaleTimeString();
        return `[${time}] ${message}`;
      }

      function persistLogs() {
        localStorage.setItem("monitorLogs", JSON.stringify(logs.slice(-200)));
      }

      function renderLogs(entries) {
        logsContent.textContent = entries.join("\n");
      }

      function addLog(message) {
        const entry = formatLog(message);
        logs.push(entry);
        if (showLogs) {
          renderLogs(logs);
        }
        persistLogs();
      }

      function updateStats(now) {
        if (lastFrameAt) {
          const delta = now - lastFrameAt;
          if (delta > 0) {
            const instantFps = 1000 / delta;
            smoothedFps = smoothedFps ? (smoothedFps * 0.85 + instantFps * 0.15) : instantFps;
            liveFps.textContent = smoothedFps.toFixed(1);
          }
        }
        lastFrameAt = now;

        if (lastMeta && typeof lastMeta.ts === "number") {
          const latency = Math.max(0, now - lastMeta.ts);
          liveLatency.textContent = `${latency} ms`;
        }
      }

      function resetStats() {
        lastFrameAt = 0;
        smoothedFps = 0;
        liveFps.textContent = "--";
        liveLatency.textContent = "--";
        deviceIp.textContent = "Desconocida";
      }

      function startVideoFpsLoop() {
        if (typeof liveVideo.requestVideoFrameCallback !== "function") {
          return;
        }

        const onFrame = () => {
          if (!webrtcActive) {
            return;
          }
          updateStats(Date.now());
          liveVideo.requestVideoFrameCallback(onFrame);
        };

        liveVideo.requestVideoFrameCallback(onFrame);
      }

      function stopWebRtc() {
        webrtcActive = false;
        if (rtcDataChannel) {
          rtcDataChannel.close();
          rtcDataChannel = null;
        }
        if (rtcPeer) {
          rtcPeer.close();
          rtcPeer = null;
        }
        liveVideo.srcObject = null;
        resetStats();
      }

      async function updateIceInfo() {
        if (!rtcPeer) {
          return;
        }
        const stats = await rtcPeer.getStats();
        let selectedPair = null;
        stats.forEach((report) => {
          if (report.type === "candidate-pair" && (report.selected || report.nominated)) {
            selectedPair = report;
          }
        });

        if (!selectedPair) {
          return;
        }

        const localCandidate = stats.get(selectedPair.localCandidateId);
        const remoteCandidate = stats.get(selectedPair.remoteCandidateId);
        const localType = localCandidate ? localCandidate.candidateType : "desconocido";
        const remoteType = remoteCandidate ? remoteCandidate.candidateType : "desconocido";
        const remoteAddress = remoteCandidate
          ? (remoteCandidate.address || remoteCandidate.ip)
          : null;

        if (remoteAddress) {
          deviceIp.textContent = remoteAddress;
        }

        if (localType === "relay" || remoteType === "relay") {
          setStatus("WebRTC conectado. ICE relay detectado.");
          return;
        }

        setStatus(`WebRTC conectado. ICE ${localType}/${remoteType}.`);
      }

      async function handleOffer(socket, sdp) {
        stopWebRtc();
        rtcPeer = new RTCPeerConnection({
          iceServers: [],
          bundlePolicy: "max-bundle",
          rtcpMuxPolicy: "require"
        });
        rtcPeer.onicecandidate = (event) => {
          if (event.candidate) {
            socket.send(JSON.stringify({ type: "webrtc-ice", candidate: event.candidate }));
          }
        };
        rtcPeer.onconnectionstatechange = () => {
          if (rtcPeer.connectionState === "connected") {
            updateIceInfo();
          }
        };
        rtcPeer.ontrack = (event) => {
          webrtcActive = true;
          liveVideo.srcObject = event.streams[0];
          startVideoFpsLoop();
        };
        rtcPeer.ondatachannel = (event) => {
          rtcDataChannel = event.channel;
          rtcDataChannel.addEventListener("message", (msgEvent) => {
            let payload = null;
            try {
              payload = JSON.parse(msgEvent.data);
            } catch (_error) {
              return;
            }
            if (payload && payload.type === "meta" && payload.meta) {
              lastMeta = payload.meta;
              deviceQuality.textContent = payload.meta.quality
                ? `${payload.meta.quality}${payload.meta.mode ? " (" + payload.meta.mode + ")" : ""}`
                : "Desconocida";
              updateStats(Date.now());
            }
          });
        };

        await rtcPeer.setRemoteDescription(sdp);
        const answer = await rtcPeer.createAnswer();
        await rtcPeer.setLocalDescription(answer);
        socket.send(JSON.stringify({ type: "webrtc-answer", sdp: rtcPeer.localDescription }));
      }

      function connectLive() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}`);

        socket.addEventListener("open", () => {
          setStatus("Conectado a signaling.");
          addLog("Conectado a signaling.");
        });

        socket.addEventListener("message", (event) => {
          let payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch (_error) {
            return;
          }

          if (payload && payload.type === "webrtc-offer" && payload.sdp) {
            handleOffer(socket, payload.sdp);
            return;
          }

          if (payload && payload.type === "webrtc-ice" && rtcPeer && payload.candidate) {
            rtcPeer.addIceCandidate(payload.candidate);
            return;
          }
        });

        socket.addEventListener("close", () => {
          setStatus("Signaling desconectado.");
          addLog("Signaling desconectado.");
          stopWebRtc();
        });

        socket.addEventListener("error", () => {
          setStatus("Error en signaling.");
          addLog("Error en signaling.");
          stopWebRtc();
        });
      }

      connectLive();

      updateZoomDisplay(Number(zoomRange.value));
      zoomRange.addEventListener("input", () => {
        updateZoomDisplay(Number(zoomRange.value));
      });
      zoomOutBtn.addEventListener("click", () => {
        const value = clampZoom(Number(zoomRange.value) - Number(zoomRange.step));
        zoomRange.value = value.toString();
        updateZoomDisplay(value);
      });
      zoomInBtn.addEventListener("click", () => {
        const value = clampZoom(Number(zoomRange.value) + Number(zoomRange.step));
        zoomRange.value = value.toString();
        updateZoomDisplay(value);
      });
      resetZoomBtn.addEventListener("click", () => {
        zoomRange.value = "1";
        updateZoomDisplay(1);
      });
      fullscreenBtn.addEventListener("click", toggleFullscreen);
      monitorFrame.addEventListener("dblclick", () => {
        if (Number(zoomRange.value) > 1) {
          centerPan();
          return;
        }
        toggleFullscreen();
      });
      document.addEventListener("fullscreenchange", updateFullscreenLabel);
      updateFullscreenLabel();

      monitorFrame.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) {
          return;
        }
        if (Number(zoomRange.value) <= 1) {
          return;
        }
        isPanning = true;
        dragStartX = event.clientX - panX;
        dragStartY = event.clientY - panY;
        monitorFrame.classList.add("is-panning");
        monitorFrame.setPointerCapture(event.pointerId);
        event.preventDefault();
      });

      monitorFrame.addEventListener("pointermove", (event) => {
        if (!isPanning) {
          return;
        }
        const limits = computePanLimits();
        panX = clampPan(event.clientX - dragStartX, limits.limitX);
        panY = clampPan(event.clientY - dragStartY, limits.limitY);
        applyTransform();
      });

      monitorFrame.addEventListener("pointerup", (event) => {
        if (!isPanning) {
          return;
        }
        isPanning = false;
        monitorFrame.classList.remove("is-panning");
        monitorFrame.releasePointerCapture(event.pointerId);
      });

      monitorFrame.addEventListener("pointercancel", (event) => {
        if (!isPanning) {
          return;
        }
        isPanning = false;
        monitorFrame.classList.remove("is-panning");
        monitorFrame.releasePointerCapture(event.pointerId);
      });

      monitorFrame.addEventListener("wheel", (event) => {
        event.preventDefault();
        const direction = event.deltaY > 0 ? -1 : 1;
        const step = Number(zoomRange.step) || 0.1;
        const currentZoom = Number(zoomRange.value);
        const nextZoom = clampZoom(currentZoom + direction * step);
        if (nextZoom === currentZoom) {
          return;
        }

        const rect = monitorFrame.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const offsetX = event.clientX - centerX;
        const offsetY = event.clientY - centerY;
        const scale = nextZoom / currentZoom;

        panX = (panX + offsetX) * scale - offsetX;
        panY = (panY + offsetY) * scale - offsetY;

        zoomRange.value = nextZoom.toString();
        updateZoomDisplay(nextZoom);
      }, { passive: false });

      if (showLogs) {
        setInterval(() => {
          const stored = localStorage.getItem("monitorLogs");
          if (!stored) {
            return;
          }
          if (stored.length === lastStoredSize) {
            return;
          }
          lastStoredSize = stored.length;
          try {
            const entries = JSON.parse(stored);
            renderLogs(entries);
          } catch (_error) {
            return;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
