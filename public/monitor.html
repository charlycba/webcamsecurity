<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monitor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Monitor</h1>
        <p>Video en vivo en tiempo real.</p>
      </header>

      <section class="viewer">
        <div class="monitor-frame">
          <video id="liveVideo" autoplay playsinline muted></video>
        </div>
        <div class="overlay" aria-live="polite">
          <div class="overlay-card">
            <span class="info-label">IP del dispositivo</span>
            <span class="info-value" id="deviceIp">Desconocida</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">Calidad de transmision</span>
            <span class="info-value" id="deviceQuality">Desconocida</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">FPS en vivo</span>
            <span class="info-value" id="liveFps">--</span>
          </div>
          <div class="overlay-card">
            <span class="info-label">Latencia</span>
            <span class="info-value" id="liveLatency">--</span>
          </div>
        </div>
      </section>

      <section class="controls">
        <a id="openLogs" href="/monitor.html?logs=1" target="_blank" rel="noopener">Ver logs</a>
      </section>

      <section class="logs hidden" id="logsSection">
        <h2>Logs de transmision</h2>
        <pre id="logsContent"></pre>
      </section>

      <section class="status" id="status"></section>
    </main>

    <script>
      const liveVideo = document.getElementById("liveVideo");
      const status = document.getElementById("status");
      const deviceIp = document.getElementById("deviceIp");
      const deviceQuality = document.getElementById("deviceQuality");
      const liveFps = document.getElementById("liveFps");
      const liveLatency = document.getElementById("liveLatency");
      const logsSection = document.getElementById("logsSection");
      const logsContent = document.getElementById("logsContent");
      const logs = [];
      let lastStoredSize = 0;
      let lastFrameAt = 0;
      let smoothedFps = 0;
      let lastMeta = null;
      let rtcPeer = null;
      let rtcDataChannel = null;
      let webrtcActive = false;

      const params = new URLSearchParams(window.location.search);
      const showLogs = params.get("logs") === "1";

      if (showLogs) {
        logsSection.classList.remove("hidden");
      }

      function setStatus(message) {
        status.textContent = message;
      }

      function formatLog(message) {
        const time = new Date().toLocaleTimeString();
        return `[${time}] ${message}`;
      }

      function persistLogs() {
        localStorage.setItem("monitorLogs", JSON.stringify(logs.slice(-200)));
      }

      function renderLogs(entries) {
        logsContent.textContent = entries.join("\n");
      }

      function addLog(message) {
        const entry = formatLog(message);
        logs.push(entry);
        if (showLogs) {
          renderLogs(logs);
        }
        persistLogs();
      }

      function updateStats(now) {
        if (lastFrameAt) {
          const delta = now - lastFrameAt;
          if (delta > 0) {
            const instantFps = 1000 / delta;
            smoothedFps = smoothedFps ? (smoothedFps * 0.85 + instantFps * 0.15) : instantFps;
            liveFps.textContent = smoothedFps.toFixed(1);
          }
        }
        lastFrameAt = now;

        if (lastMeta && typeof lastMeta.ts === "number") {
          const latency = Math.max(0, now - lastMeta.ts);
          liveLatency.textContent = `${latency} ms`;
        }
      }

      function resetStats() {
        lastFrameAt = 0;
        smoothedFps = 0;
        liveFps.textContent = "--";
        liveLatency.textContent = "--";
        deviceIp.textContent = "Desconocida";
      }

      function startVideoFpsLoop() {
        if (typeof liveVideo.requestVideoFrameCallback !== "function") {
          return;
        }

        const onFrame = () => {
          if (!webrtcActive) {
            return;
          }
          updateStats(Date.now());
          liveVideo.requestVideoFrameCallback(onFrame);
        };

        liveVideo.requestVideoFrameCallback(onFrame);
      }

      function stopWebRtc() {
        webrtcActive = false;
        if (rtcDataChannel) {
          rtcDataChannel.close();
          rtcDataChannel = null;
        }
        if (rtcPeer) {
          rtcPeer.close();
          rtcPeer = null;
        }
        liveVideo.srcObject = null;
        resetStats();
      }

      async function updateIceInfo() {
        if (!rtcPeer) {
          return;
        }
        const stats = await rtcPeer.getStats();
        let selectedPair = null;
        stats.forEach((report) => {
          if (report.type === "candidate-pair" && (report.selected || report.nominated)) {
            selectedPair = report;
          }
        });

        if (!selectedPair) {
          return;
        }

        const localCandidate = stats.get(selectedPair.localCandidateId);
        const remoteCandidate = stats.get(selectedPair.remoteCandidateId);
        const localType = localCandidate ? localCandidate.candidateType : "desconocido";
        const remoteType = remoteCandidate ? remoteCandidate.candidateType : "desconocido";
        const remoteAddress = remoteCandidate
          ? (remoteCandidate.address || remoteCandidate.ip)
          : null;

        if (remoteAddress) {
          deviceIp.textContent = remoteAddress;
        }

        if (localType === "relay" || remoteType === "relay") {
          setStatus("WebRTC conectado. ICE relay detectado.");
          return;
        }

        setStatus(`WebRTC conectado. ICE ${localType}/${remoteType}.`);
      }

      async function handleOffer(socket, sdp) {
        stopWebRtc();
        rtcPeer = new RTCPeerConnection({
          iceServers: [],
          bundlePolicy: "max-bundle",
          rtcpMuxPolicy: "require"
        });
        rtcPeer.onicecandidate = (event) => {
          if (event.candidate) {
            socket.send(JSON.stringify({ type: "webrtc-ice", candidate: event.candidate }));
          }
        };
        rtcPeer.onconnectionstatechange = () => {
          if (rtcPeer.connectionState === "connected") {
            updateIceInfo();
          }
        };
        rtcPeer.ontrack = (event) => {
          webrtcActive = true;
          liveVideo.srcObject = event.streams[0];
          startVideoFpsLoop();
        };
        rtcPeer.ondatachannel = (event) => {
          rtcDataChannel = event.channel;
          rtcDataChannel.addEventListener("message", (msgEvent) => {
            let payload = null;
            try {
              payload = JSON.parse(msgEvent.data);
            } catch (_error) {
              return;
            }
            if (payload && payload.type === "meta" && payload.meta) {
              lastMeta = payload.meta;
              deviceQuality.textContent = payload.meta.quality
                ? `${payload.meta.quality}${payload.meta.mode ? " (" + payload.meta.mode + ")" : ""}`
                : "Desconocida";
              updateStats(Date.now());
            }
          });
        };

        await rtcPeer.setRemoteDescription(sdp);
        const answer = await rtcPeer.createAnswer();
        await rtcPeer.setLocalDescription(answer);
        socket.send(JSON.stringify({ type: "webrtc-answer", sdp: rtcPeer.localDescription }));
      }

      function connectLive() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}`);

        socket.addEventListener("open", () => {
          setStatus("Conectado a signaling.");
          addLog("Conectado a signaling.");
        });

        socket.addEventListener("message", (event) => {
          let payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch (_error) {
            return;
          }

          if (payload && payload.type === "webrtc-offer" && payload.sdp) {
            handleOffer(socket, payload.sdp);
            return;
          }

          if (payload && payload.type === "webrtc-ice" && rtcPeer && payload.candidate) {
            rtcPeer.addIceCandidate(payload.candidate);
            return;
          }
        });

        socket.addEventListener("close", () => {
          setStatus("Signaling desconectado.");
          addLog("Signaling desconectado.");
          stopWebRtc();
        });

        socket.addEventListener("error", () => {
          setStatus("Error en signaling.");
          addLog("Error en signaling.");
          stopWebRtc();
        });
      }

      connectLive();

      if (showLogs) {
        setInterval(() => {
          const stored = localStorage.getItem("monitorLogs");
          if (!stored) {
            return;
          }
          if (stored.length === lastStoredSize) {
            return;
          }
          lastStoredSize = stored.length;
          try {
            const entries = JSON.parse(stored);
            renderLogs(entries);
          } catch (_error) {
            return;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
