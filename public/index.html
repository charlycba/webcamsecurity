<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Camara Seguridad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Camara de Seguridad</h1>
        <p>Usa tu telefono como camara en la red local.</p>
      </header>

      <section class="viewer">
        <video id="video" autoplay playsinline muted></video>
      </section>

      <section class="controls">
        <button id="startBtn">Iniciar camara</button>
        <button id="stopBtn" disabled>Detener</button>
        <button id="switchBtn" disabled>Cambiar camara</button>
      </section>

      <section class="extras">
        <label class="select">
          Calidad
          <select id="qualitySelect">
            <option value="low">Baja</option>
            <option value="medium" selected>Media</option>
            <option value="high">Alta</option>
          </select>
        </label>
      </section>

      <section class="status" id="status"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
