services:
  webcam:
    build: .
    ports:
      - "80:8080"
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - PORT=8443
      - HTTP_PORT=8080
      - SNAPSHOT_SOURCE=${SNAPSHOT_SOURCE:-/dev/video0}
      - SNAPSHOT_TIMEOUT_MS=5000
      - CERT_PATH=/app/certs/local.crt
      - KEY_PATH=/app/certs/local.key
